<div class="todo-container">
  
  <h1 style="text-align: center; margin-top: 0;">To-Do Listem</h1>
  
  <div class="input-group">
    <input 
      type="text" 
      class="todo-input"
      [(ngModel)]="newTaskTitle" 
      placeholder="Yeni bir görev yaz...">
      
    <button class="btn-add" (click)="addNewTodo()">
      Ekle
    </button>
  </div>
  
  @if (todos().length > 0) {
    <ul>
      @for (item of todos(); track item.id) {
        
        <li class="todo-item">
          
          <input 
            type="checkbox" 
            [checked]="item.isCompleted" 
            (change)="toggleCompletion(item)"
            style="cursor: pointer; transform: scale(1.3);">
          
          <span 
            [style.textDecoration]="item.isCompleted ? 'line-through' : 'none'"
            [style.color]="item.isCompleted ? '#888' : '#000'"
            style="flex-grow: 1; font-size: 18px;">
            {{ item.title }} 
          </span>

          <button class="btn-delete" (click)="deleteTask(item.id)" >
            Sil
          </button>

        </li>

      }
    </ul>

  } @else {
    <p style="color: gray; text-align: center;">
      Yükleniyor veya hiç görev bulunamadı...
    </p>
  }

</div>
